version: 1
display_name: Anki Card Authoring
short_description: Create Anki cards from simple study content without template internals.
default_prompt: Create or revise Anki cards using the 9-field contract (`id`, `type`, `question`, `options`, `answer`, `notes`, strict JSON `extra`, `audio`, `occlusion_image`); keep authoring changes to card data/docs and do not rebuild or touch runtime files unless behavior changes.

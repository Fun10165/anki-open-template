version: 1
display_name: Anki Open Template
short_description: Maintain a TS-driven Anki template bundle and APKG test deck.
default_prompt: Maintain, debug, and extend generated Anki card templates around the 9-field contract (`id`, `type`, `question`, `options`, plain-text `answer`, `notes`, strict JSON `extra`, `audio`, `occlusion_image`); keep ordinary text escaped, require explicit `trusted_html(...)` only for repository-authored rich fields, sanitize rich HTML at runtime, rebuild generated templates/APKG from source, and run build plus automated field/DOM/APKG regressions without hand-editing generated HTML.

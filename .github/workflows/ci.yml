name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --locked
      - run: uv run -m unittest discover -s tests -p "test_*.py"

<script>
  (function () {
    if (window.__ankiAwesomeSelectDebugInstalled) {
      return;
    }
    window.__ankiAwesomeSelectDebugInstalled = true;
    function showDebug(message) {
      try {
        var panel = document.getElementById("anki-debug-panel");
        if (!panel) {
          panel = document.createElement("pre");
          panel.id = "anki-debug-panel";
          panel.style.whiteSpace = "pre-wrap";
          panel.style.wordBreak = "break-word";
          panel.style.background = "#fff1f1";
          panel.style.color = "#a40000";
          panel.style.border = "1px solid #ffb3b3";
          panel.style.borderRadius = "12px";
          panel.style.padding = "12px";
          panel.style.margin = "12px 12px 0 12px";
          panel.style.fontSize = "12px";
          panel.style.lineHeight = "1.5";
          panel.style.fontFamily = "ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
          if (document.body) {
            document.body.insertBefore(panel, document.body.firstChild);
          } else {
            document.addEventListener("DOMContentLoaded", function () {
              document.body.insertBefore(panel, document.body.firstChild);
            }, {once: true});
          }
        }
        panel.textContent = message;
      } catch (_error) { }
    }
    window.addEventListener("error", function (event) {
      showDebug(
        "[anki-open-template front error]\\n" +
        "message: " + String(event.message || "") + "\\n" +
        "source: " + String(event.filename || "") + "\\n" +
        "line: " + String(event.lineno || 0) + "\\n" +
        "column: " + String(event.colno || 0) + "\\n" +
        "stack: " + String(event.error && event.error.stack ? event.error.stack : "")
      );
    });
    window.addEventListener("unhandledrejection", function (event) {
      var reason = event && event.reason ? event.reason : "";
      showDebug(
        "[anki-open-template front rejection]\\n" +
        String(reason && reason.stack ? reason.stack : reason)
      );
    });
  })();
</script>

<div id="field-store" class="hidden">
  <div id="raw-id">{{id}}</div>
  <div id="raw-type">{{type}}</div>
  <div id="raw-question">{{question}}</div>
  <div id="raw-options">{{options}}</div>
  <div id="raw-answer">{{answer}}</div>
  <div id="raw-notes">{{notes}}</div>
  <div id="raw-extra">{{extra}}</div>
  <div id="raw-audio">{{audio}}</div>
  <div id="raw-occlusion-image">{{occlusion_image}}</div>
  <div id="raw-tags">{{Tags}}</div>
  <div id="raw-deck">{{Deck}}</div>
</div>

<div id="app" class="app-shell">
  <div class="card-shell">
    <div class="card-toolbar">
      <div id="deck-name" class="deck-name"></div>
      <button id="settings-trigger" class="ghost-button" type="button" aria-haspopup="dialog"
        aria-controls="settings-modal" aria-expanded="false">卡片设置</button>
    </div>

    <div class="card-head">
      <div class="card-meta">
        <span id="card-id" class="card-id"></span>
        <span id="card-type" class="card-type"></span>
      </div>
      <div id="tag-bar" class="tag-bar"></div>
    </div>

    <div id="prompt" class="prompt"></div>
    <div id="front-interaction" class="interaction-area"></div>
    <div id="front-controls" class="control-row"></div>
    <div id="front-notes" class="notes-panel notes-panel-front hidden"></div>
    <div id="audio-panel" class="audio-panel"></div>
  </div>
</div>

<div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title"
  aria-hidden="true">
  <div class="modal-card">
    <div class="modal-head">
      <div id="settings-title">卡片设置</div>
      <button id="settings-close" class="ghost-button" type="button">关闭</button>
    </div>
    <div class="settings-grid">
      <label class="setting-item"><span>显示题型</span><input id="setting-show-type" type="checkbox"></label>
      <label class="setting-item"><span>显示牌组</span><input id="setting-show-deck" type="checkbox"></label>
      <label class="setting-item"><span>正面显示解析</span><input id="setting-show-notes-front" type="checkbox"></label>
      <label class="setting-item"><span>自动翻转</span><input id="setting-auto-flip" type="checkbox"></label>
      <label class="setting-item"><span>随机选项</span><input id="setting-random-options" type="checkbox"></label>
      <label class="setting-item"><span>答题统计</span><input id="setting-choice-stats" type="checkbox"></label>
      <label class="setting-item">
        <span>选项显示</span>
        <select id="setting-choice-display">
          <option value="immediate">立即显示</option>
          <option value="delay">延迟显示</option>
          <option value="manual">手动显示</option>
        </select>
      </label>
      <label id="setting-choice-delay-row" class="setting-item hidden">
        <span>延迟时间 (ms)</span>
        <input id="setting-choice-delay-ms" type="number" min="0" max="60000" step="100" inputmode="numeric">
      </label>
      <label class="setting-item">
        <span>填空输入样式</span>
        <select id="setting-fill-mode">
          <option value="line">横线</option>
          <option value="box">方框</option>
          <option value="mask">遮挡</option>
        </select>
      </label>
      <label class="setting-item">
        <span>遮挡顺序</span>
        <select id="setting-occlusion-order">
          <option value="tb-lr">先上下后左右</option>
          <option value="lr-tb">先左右后上下</option>
        </select>
      </label>
      <label class="setting-item">
        <span>主题</span>
        <select id="setting-theme">
          <option value="warm">暖色</option>
          <option value="mint">薄荷</option>
          <option value="slate">石板</option>
        </select>
      </label>
    </div>
  </div>
</div>

<div id="front-footer" class="footer">V95 Rebuild · 晚期多题型模板</div>
